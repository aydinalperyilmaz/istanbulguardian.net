<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a1428">
  <title>Hotel Login — Istanbul Guardian</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%E2%9A%93%3C/text%3E%3C/svg%3E">

  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-card {
      max-width: 440px;
      width: 100%;
      background: var(--ig-surface);
      border: 1px solid var(--ig-border);
      border-radius: var(--ig-radius-md);
      padding: 2.5rem;
    }

    .role-badge {
      display: inline-block;
      background: rgba(201, 169, 97, 0.15);
      color: var(--ig-gold);
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .help-link {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--ig-border-soft);
      font-size: 0.85rem;
      color: var(--ig-text-soft);
    }

    .help-link a {
      color: var(--ig-gold);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">

      <div style="text-align: center; margin-bottom: 1.5rem;">
        <div style="font-size: 2.5rem; margin-bottom: .5rem;">🏨</div>
        <span class="role-badge">HOTEL PARTNER</span>
        <h2 style="margin-bottom: .5rem;">Welcome back</h2>
        <p class="ig-text-soft" style="font-size: .9rem;">
          Sign in to your hotel dashboard
        </p>
      </div>

      <form id="loginForm">
        <div class="ig-form-group">
          <label class="ig-label">Email</label>
          <input type="email" class="ig-input" id="email" required autocomplete="username">
        </div>

        <div class="ig-form-group">
          <label class="ig-label">Password</label>
          <input type="password" class="ig-input" id="password" required autocomplete="current-password">
        </div>

        <div id="errorMsg" class="ig-error ig-hidden ig-mb-md"></div>

        <button type="submit" class="ig-btn ig-btn-primary ig-btn-block" id="submitBtn">
          Sign in
        </button>
      </form>

      <div class="help-link">
        Not a hotel partner? <br>
        <a href="index.html">Go to guest area →</a>
      </div>

      <div class="help-link" style="border-top: none; padding-top: .5rem;">
        Need help? <a href="mailto:support@istanbulguardian.net">Contact support</a>
      </div>

    </div>
  </div>

  <script src="assets/supabase.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {

      // Eğer zaten giriş yapmış bir hotel owner ise direkt panele gönder
      const sb = await initSupabase();
      const { data: { user } } = await sb.auth.getUser();

      if (user) {
        // Kullanıcı bir otelin sahibi mi?
        const { data: hotel } = await sb
          .from('hotels').select('id').eq('owner_profile_id', user.id).maybeSingle();

        const { data: profile } = await sb
          .from('profiles').select('role').eq('id', user.id).maybeSingle();

        // Otel sahibi VEYA admin ise direkt hotel paneline
        if (hotel || ['admin', 'superadmin'].includes(profile?.role)) {
          window.location.href = 'hotel.html';
          return;
        }
      }

      // Form handler
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');
        errorEl.classList.add('ig-hidden');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
          // Önce çıkış yap (eski session varsa)
          await sb.auth.signOut();

          // Giriş yap
          const { data, error } = await sb.auth.signInWithPassword({ email, password });
          if (error) throw error;

          const userId = data.user.id;

          // Bu kullanıcı bir otelin sahibi mi kontrol et
          const { data: hotel } = await sb
            .from('hotels').select('id, name').eq('owner_profile_id', userId).maybeSingle();

          const { data: profile } = await sb
            .from('profiles').select('role').eq('id', userId).maybeSingle();

          // Otel sahibi DEĞİL ve admin DEĞİL ise → reddet
          if (!hotel && !['admin', 'superadmin'].includes(profile?.role)) {
            await sb.auth.signOut();
            throw new Error('This account is not registered as a hotel partner. Please use the guest area or contact support.');
          }

          // Tamam, otel paneline gönder
          window.location.href = 'hotel.html';

        } catch (err) {
          errorEl.textContent = err.message || 'Sign in failed';
          errorEl.classList.remove('ig-hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign in';
        }
      });
    });
  </script>

</body>
</html>
