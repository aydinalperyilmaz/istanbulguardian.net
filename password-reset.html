<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifre Sıfırla — Istanbul Guardian</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div style="max-width:440px; width:100%; background:var(--ig-surface); border:1px solid var(--ig-border); border-radius:var(--ig-radius-md); padding:2.5rem;">
      <div style="text-align:center; margin-bottom:1.5rem;">
        <div style="font-size:2.5rem; margin-bottom:.5rem;">🔑</div>
        <h2>Yeni şifre belirleyin</h2>
        <p class="ig-text-soft" style="font-size:.9rem;">Hesabınız için yeni bir şifre belirleyin</p>
      </div>

      <form id="resetForm">
        <div class="ig-form-group">
          <label class="ig-label">Yeni şifre</label>
          <input type="password" class="ig-input" id="newPassword" required minlength="6" autocomplete="new-password">
        </div>

        <div class="ig-form-group">
          <label class="ig-label">Yeni şifre (tekrar)</label>
          <input type="password" class="ig-input" id="confirmPassword" required minlength="6" autocomplete="new-password">
        </div>

        <div id="errorMsg" class="ig-error ig-hidden ig-mb-md"></div>
        <div id="successMsg" class="ig-hidden ig-mb-md" style="background:rgba(95, 184, 138, 0.1); border:1px solid var(--ig-success); padding:.75rem; border-radius:6px; color:var(--ig-success); font-size:.9rem;"></div>

        <button type="submit" class="ig-btn ig-btn-primary ig-btn-block" id="submitBtn">
          Şifreyi güncelle
        </button>
      </form>

      <p class="ig-text-center ig-mt-lg" style="font-size:.85rem;">
        <a href="hotel.html" class="ig-text-gold">← Otel girişine dön</a>
      </p>
    </div>
  </div>

  <script src="assets/supabase.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      const btn = document.getElementById('submitBtn');
      errorEl.classList.add('ig-hidden');
      successEl.classList.add('ig-hidden');

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        errorEl.textContent = 'Şifreler eşleşmiyor';
        errorEl.classList.remove('ig-hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Güncelleniyor...';

      try {
        const sb = await initSupabase();
        const { error } = await sb.auth.updateUser({ password: newPassword });
        if (error) throw error;

        successEl.textContent = '✓ Şifreniz güncellendi. 3 saniye içinde giriş sayfasına yönlendiriliyorsunuz...';
        successEl.classList.remove('ig-hidden');
        setTimeout(() => {
          window.location.href = 'hotel.html';
        }, 3000);
      } catch (err) {
        errorEl.textContent = err.message || 'Bir hata oluştu';
        errorEl.classList.remove('ig-hidden');
        btn.disabled = false;
        btn.textContent = 'Şifreyi güncelle';
      }
    });
  </script>
</body>
</html>
