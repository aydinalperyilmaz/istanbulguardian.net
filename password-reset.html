<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifre Sıfırlama — Istanbul Guardian</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div style="max-width:440px; width:100%; background:var(--ig-surface); border:1px solid var(--ig-border); border-radius:var(--ig-radius-md); padding:2.5rem;">

      <div id="loadingState" class="ig-text-center" style="padding:2rem 0;">
        <div class="ig-loader" style="margin:0 auto;"></div>
      </div>

      <!-- ADIM 1: Email iste -->
      <div id="emailStep" class="ig-hidden">
        <div style="text-align:center; margin-bottom:1.5rem;">
          <div style="font-size:2.5rem; margin-bottom:.5rem;">🔑</div>
          <h2>Şifrenizi mi unuttunuz?</h2>
          <p class="ig-text-soft" style="font-size:.9rem;">
            E-posta adresinizi yazın, size sıfırlama linki gönderelim.
          </p>
        </div>

        <form id="emailForm">
          <div class="ig-form-group">
            <label class="ig-label">E-posta adresi</label>
            <input type="email" class="ig-input" id="email" required placeholder="ornek@otelim.com">
          </div>
          <div id="emailError" class="ig-error ig-hidden ig-mb-md"></div>
          <div id="emailSuccess" class="ig-hidden ig-mb-md" style="background:rgba(95, 184, 138, 0.1); border:1px solid var(--ig-success); padding:.75rem; border-radius:6px; color:var(--ig-success); font-size:.9rem;"></div>
          <button type="submit" class="ig-btn ig-btn-primary ig-btn-block" id="emailSubmit">Sıfırlama linki gönder</button>
        </form>

        <p class="ig-text-center ig-mt-lg" style="font-size:.85rem;">
          <a href="hotel.html" class="ig-text-gold">← Otel girişine dön</a>
        </p>
      </div>

      <!-- ADIM 2: Yeni şifre belirle -->
      <div id="newPasswordStep" class="ig-hidden">
        <div style="text-align:center; margin-bottom:1.5rem;">
          <div style="font-size:2.5rem; margin-bottom:.5rem;">🔐</div>
          <h2>Yeni şifre belirleyin</h2>
          <p class="ig-text-soft" style="font-size:.9rem;">Hesabınız için yeni bir şifre belirleyin</p>
        </div>

        <form id="passwordForm">
          <div class="ig-form-group">
            <label class="ig-label">Yeni şifre</label>
            <input type="password" class="ig-input" id="newPassword" required minlength="6" autocomplete="new-password" placeholder="En az 6 karakter">
          </div>
          <div class="ig-form-group">
            <label class="ig-label">Yeni şifre (tekrar)</label>
            <input type="password" class="ig-input" id="confirmPassword" required minlength="6" autocomplete="new-password">
          </div>
          <div id="passwordError" class="ig-error ig-hidden ig-mb-md"></div>
          <div id="passwordSuccess" class="ig-hidden ig-mb-md" style="background:rgba(95, 184, 138, 0.1); border:1px solid var(--ig-success); padding:.75rem; border-radius:6px; color:var(--ig-success); font-size:.9rem;"></div>
          <button type="submit" class="ig-btn ig-btn-primary ig-btn-block" id="passwordSubmit">Şifreyi güncelle</button>
        </form>
      </div>

    </div>
  </div>

  <script src="assets/supabase.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const sb = await initSupabase();

      // URL'de access_token var mı kontrol et (email link'inden geldiyse)
      const hash = window.location.hash;
      const hasResetToken = hash.includes('access_token') || hash.includes('type=recovery');

      // Veya kullanıcı zaten oturum açmışsa (recovery flow'u Supabase otomatik kuruyor)
      const { data: { session } } = await sb.auth.getSession();

      document.getElementById('loadingState').classList.add('ig-hidden');

      if (hasResetToken || (session && hash.includes('type=recovery'))) {
        // Şifre sıfırlama linkinden geldi → yeni şifre belirleme adımı
        document.getElementById('newPasswordStep').classList.remove('ig-hidden');
      } else {
        // Email girme adımı
        document.getElementById('emailStep').classList.remove('ig-hidden');
      }

      // Email form
      document.getElementById('emailForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('emailError');
        const successEl = document.getElementById('emailSuccess');
        const btn = document.getElementById('emailSubmit');
        errorEl.classList.add('ig-hidden');
        successEl.classList.add('ig-hidden');
        btn.disabled = true;
        btn.textContent = 'Gönderiliyor...';

        const email = document.getElementById('email').value.trim();

        try {
          const { error } = await sb.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/password-reset.html'
          });
          if (error) throw error;
          successEl.textContent = '✓ Sıfırlama linki e-postanıza gönderildi. Birkaç dakika içinde gelmezse spam klasörünü kontrol edin.';
          successEl.classList.remove('ig-hidden');
          btn.textContent = 'Gönderildi';
        } catch (err) {
          errorEl.textContent = err.message || 'Bir hata oluştu';
          errorEl.classList.remove('ig-hidden');
          btn.disabled = false;
          btn.textContent = 'Sıfırlama linki gönder';
        }
      });

      // Password form
      document.getElementById('passwordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('passwordError');
        const successEl = document.getElementById('passwordSuccess');
        const btn = document.getElementById('passwordSubmit');
        errorEl.classList.add('ig-hidden');
        successEl.classList.add('ig-hidden');

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
          errorEl.textContent = 'Şifreler eşleşmiyor';
          errorEl.classList.remove('ig-hidden');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Güncelleniyor...';

        try {
          const { error } = await sb.auth.updateUser({ password: newPassword });
          if (error) throw error;
          successEl.textContent = '✓ Şifreniz güncellendi. 3 saniye içinde giriş sayfasına yönlendiriliyorsunuz...';
          successEl.classList.remove('ig-hidden');
          setTimeout(() => { window.location.href = 'hotel.html'; }, 3000);
        } catch (err) {
          errorEl.textContent = err.message || 'Bir hata oluştu';
          errorEl.classList.remove('ig-hidden');
          btn.disabled = false;
          btn.textContent = 'Şifreyi güncelle';
        }
      });
    });
  </script>
</body>
</html>
