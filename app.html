<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1428">
  <title>Istanbul Guardian — Explore</title>

  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%E2%9A%93%3C/text%3E%3C/svg%3E">
</head>
<body>

  <!-- Üst nav -->
  <nav class="ig-nav">
    <div class="ig-nav-brand">
      Istanbul <span>Guardian</span>
    </div>

    <div class="ig-flex ig-items-center ig-gap-sm">
      <div class="ig-lang-switcher">
        <button class="ig-lang-btn" data-lang="tr">TR</button>
        <button class="ig-lang-btn" data-lang="en">EN</button>
        <button class="ig-lang-btn" data-lang="ar">عر</button>
        <button class="ig-lang-btn" data-lang="ru">RU</button>
      </div>
      <button class="ig-btn ig-btn-ghost" id="signoutBtn" style="padding:.5rem 1rem;font-size:.85rem;">
        <span data-i18n="auth.signout">Sign out</span>
      </button>
    </div>
  </nav>

  <main class="ig-page">
    <div class="ig-container">

      <!-- Karşılama -->
      <section class="ig-mb-2xl ig-fade-in">
        <div class="ig-overline ig-mb-sm">
          <span data-i18n="welcome.title">Welcome</span>, <span id="userName">—</span>
        </div>
        <h1 class="ig-display ig-mb-md" data-i18n="ai.askme">Ask me about Istanbul</h1>
        <p class="ig-tagline" id="hotelLine">—</p>
      </section>

      <!-- AI Asistan kutusu (büyük CTA) -->
      <section class="ig-mb-2xl ig-fade-in ig-fade-in-delay-1">
        <a href="ai.html" class="ig-card" style="display:block; background:linear-gradient(135deg, var(--ig-surface) 0%, var(--ig-surface-2) 100%); border-color:var(--ig-gold); cursor:pointer;">
          <div class="ig-flex ig-items-center ig-gap-md">
            <div style="font-size:2.5rem;">✨</div>
            <div style="flex:1;">
              <h3 class="ig-text-gold" data-i18n="ai.title">Your AI Guide</h3>
              <p class="ig-text-soft" style="font-size:.9rem; margin-top:.25rem;" data-i18n="ai.placeholder">
                What should I do today?
              </p>
            </div>
            <div class="ig-text-gold" style="font-size:1.5rem;">→</div>
          </div>
        </a>
      </section>

      <!-- Kategoriler -->
      <section class="ig-fade-in ig-fade-in-delay-2">
        <h2 class="ig-mb-lg">
          <span class="ig-overline" style="font-size:.7rem;">CATEGORIES</span>
        </h2>

        <div class="ig-grid ig-grid-2">

          <a href="category.html?cat=hammam" class="ig-category-card">
            <span class="ig-category-icon">🛁</span>
            <span class="ig-category-name" data-i18n="cat.hammam">Hammam &amp; SPA</span>
          </a>

          <a href="category.html?cat=tour" class="ig-category-card">
            <span class="ig-category-icon">⛵</span>
            <span class="ig-category-name" data-i18n="cat.tour">Tours</span>
          </a>

          <a href="category.html?cat=transfer" class="ig-category-card">
            <span class="ig-category-icon">🚐</span>
            <span class="ig-category-name" data-i18n="cat.transfer">Transfer</span>
          </a>

          <a href="category.html?cat=restaurant" class="ig-category-card">
            <span class="ig-category-icon">🍽</span>
            <span class="ig-category-name" data-i18n="cat.restaurant">Restaurant</span>
          </a>

          <a href="category.html?cat=health" class="ig-category-card">
            <span class="ig-category-icon">🏥</span>
            <span class="ig-category-name" data-i18n="cat.health">Health Tourism</span>
          </a>

          <a href="category.html?cat=nightlife" class="ig-category-card">
            <span class="ig-category-icon">🌃</span>
            <span class="ig-category-name" data-i18n="cat.nightlife">Nightlife</span>
          </a>

        </div>
      </section>

      <!-- Aktif rezervasyonlar (varsa) -->
      <section id="activeBookingsSection" class="ig-mt-2xl ig-hidden ig-fade-in">
        <h2 class="ig-mb-lg">
          <span class="ig-overline" style="font-size:.7rem;">YOUR BOOKINGS</span>
        </h2>
        <div id="activeBookings" class="ig-list"></div>
      </section>

      <!-- Footer -->
      <p class="ig-text-center ig-text-dim ig-mt-2xl" style="font-size:.75rem;">
        © 2026 Bosphorus Global · KVKK · Privacy
      </p>

    </div>
  </main>

  <!-- Loading -->
  <div id="loadingOverlay" class="ig-loading-overlay ig-hidden">
    <div class="ig-loader ig-loader-large"></div>
  </div>

  <!-- Scripts -->
  <script src="assets/i18n.js"></script>
  <script src="assets/supabase.js"></script>

  <script>
    // ========================================================================
    // APP.HTML — Ana sayfa (kategoriler + AI giriş + aktif rezervasyonlar)
    // ========================================================================

    document.addEventListener('DOMContentLoaded', async () => {

      // Aktif dil
      const currentLang = IG.getLang();
      document.querySelectorAll('.ig-lang-btn').forEach(btn => {
        if (btn.dataset.lang === currentLang) btn.classList.add('active');
        btn.addEventListener('click', () => IG.setLang(btn.dataset.lang));
      });

      // Auth kontrol — kullanıcı giriş yapmamışsa index.html'e yönlendir
      let user;
      try {
        user = await IG.auth.getUser();
        if (!user) {
          window.location.href = 'index.html';
          return;
        }
      } catch (err) {
        window.location.href = 'index.html';
        return;
      }

      // Kullanıcı adını göster
      const userName = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Guest';
      document.getElementById('userName').textContent = userName;

      // Otel bilgisini yükle
      await loadHotelLine();

      // Aktif rezervasyonları yükle
      loadActiveBookings();

      // Sign out
      document.getElementById('signoutBtn').addEventListener('click', async () => {
        if (confirm(IG.t('auth.signout') + '?')) {
          await IG.auth.signOut();
        }
      });

    });

    // ========================================================================
    // OTEL BİLGİSİ
    // ========================================================================
    async function loadHotelLine() {
      const slug = localStorage.getItem('ig_hotel_slug');
      if (!slug) {
        document.getElementById('hotelLine').textContent = IG.t('app.tagline');
        return;
      }

      try {
        const sb = await initSupabase();
        const { data: hotel } = await sb
          .from('hotels')
          .select('name, district')
          .eq('slug', slug)
          .eq('is_active', true)
          .single();

        if (hotel) {
          document.getElementById('hotelLine').textContent =
            `${hotel.name} · ${hotel.district}`;
        } else {
          document.getElementById('hotelLine').textContent = IG.t('app.tagline');
        }
      } catch (e) {
        document.getElementById('hotelLine').textContent = IG.t('app.tagline');
      }
    }

    // ========================================================================
    // AKTİF REZERVASYONLAR
    // ========================================================================
    async function loadActiveBookings() {
      try {
        const sb = await initSupabase();

        const { data: bookings, error } = await sb
          .from('bookings')
          .select(`
            id, booking_no, scheduled_at, status, total_amount, currency, num_persons,
            services (name),
            providers (name, category)
          `)
          .in('status', ['pending_payment', 'confirmed', 'in_progress'])
          .order('scheduled_at', { ascending: true })
          .limit(5);

        if (error || !bookings || bookings.length === 0) {
          return;
        }

        const list = document.getElementById('activeBookings');
        list.innerHTML = bookings.map(b => `
          <a href="booking-detail.html?id=${b.id}" class="ig-card" style="display:block;">
            <div class="ig-flex ig-justify-between ig-items-center ig-mb-sm">
              <span class="ig-overline">#${b.booking_no}</span>
              <span class="ig-badge ig-badge-${statusBadgeClass(b.status)}">${IG.t('status.' + b.status)}</span>
            </div>
            <h4 class="ig-mb-sm">${escapeHtml(b.services?.name || '—')}</h4>
            <div class="ig-text-soft" style="font-size:.875rem;">
              ${escapeHtml(b.providers?.name || '')}
            </div>
            <div class="ig-flex ig-justify-between ig-mt-md">
              <span class="ig-text-soft" style="font-size:.875rem;">
                ${formatDate(b.scheduled_at)}
              </span>
              <span class="ig-text-gold" style="font-weight:600;">
                ${b.total_amount} ${b.currency}
              </span>
            </div>
          </a>
        `).join('');

        document.getElementById('activeBookingsSection').classList.remove('ig-hidden');

      } catch (err) {
        console.error('Rezervasyonlar yüklenemedi:', err);
      }
    }

    // ========================================================================
    // YARDIMCI
    // ========================================================================
    function statusBadgeClass(status) {
      switch(status) {
        case 'confirmed':
        case 'completed':    return 'success';
        case 'cancelled':
        case 'no_show':      return 'danger';
        case 'pending_payment':
        case 'in_progress':  return 'warning';
        default:             return '';
      }
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString(IG.getLang(), {
        day: 'numeric', month: 'short',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, c => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
      }[c]));
    }
  </script>

</body>
</html>
