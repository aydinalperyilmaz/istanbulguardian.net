<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1428">
  <title>Istanbul Guardian — Booking</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%E2%9A%93%3C/text%3E%3C/svg%3E">
</head>
<body>

  <nav class="ig-nav">
    <a href="javascript:history.back()" class="ig-nav-brand" style="text-decoration:none;">
      ← Istanbul <span>Guardian</span>
    </a>
    <div class="ig-lang-switcher">
      <button class="ig-lang-btn" data-lang="tr">TR</button>
      <button class="ig-lang-btn" data-lang="en">EN</button>
      <button class="ig-lang-btn" data-lang="ar">عر</button>
      <button class="ig-lang-btn" data-lang="ru">RU</button>
    </div>
  </nav>

  <main class="ig-page">
    <div class="ig-container ig-container-sm">

      <!-- Yükleniyor -->
      <div id="loadingState" class="ig-text-center" style="padding:4rem 0;">
        <div class="ig-loader ig-loader-large" style="margin:0 auto;"></div>
      </div>

      <!-- Hata -->
      <div id="errorState" class="ig-card ig-text-center ig-hidden" style="padding:3rem 1.5rem;">
        <div style="font-size:3rem; margin-bottom:1rem;">⚠️</div>
        <h3 class="ig-mb-sm">Service unavailable</h3>
        <a href="app.html" class="ig-btn ig-btn-primary ig-mt-md">
          <span data-i18n="action.back">Back</span>
        </a>
      </div>

      <!-- Form -->
      <div id="bookingForm" class="ig-hidden ig-fade-in">

        <div class="ig-overline ig-mb-sm">CONFIRM YOUR BOOKING</div>
        <h1 class="ig-display ig-mb-xl">Booking details</h1>

        <!-- Hizmet özeti -->
        <div class="ig-card ig-mb-xl" style="background:linear-gradient(135deg, var(--ig-surface) 0%, var(--ig-surface-2) 100%);">
          <div class="ig-overline ig-mb-sm">SERVICE</div>
          <h3 id="summaryServiceName" class="ig-mb-sm">—</h3>
          <p class="ig-text-soft" id="summaryProviderName" style="font-size:.875rem;">—</p>
          <div class="ig-flex ig-justify-between ig-mt-md">
            <span class="ig-text-soft" id="summaryDuration">—</span>
            <span class="ig-text-gold" id="summaryUnitPrice" style="font-weight:600;">—</span>
          </div>
        </div>

        <!-- Form -->
        <form id="bookingFormEl">

          <!-- Tarih -->
          <div class="ig-form-group">
            <label class="ig-label" for="bookingDate">
              <span data-i18n="booking.date">Date</span>
            </label>
            <input type="date" id="bookingDate" class="ig-input" required>
          </div>

          <!-- Saat -->
          <div class="ig-form-group">
            <label class="ig-label" for="bookingTime">
              <span data-i18n="booking.time">Time</span>
            </label>
            <input type="time" id="bookingTime" class="ig-input" required>
          </div>

          <!-- Kişi sayısı -->
          <div class="ig-form-group">
            <label class="ig-label" for="bookingPersons">
              <span data-i18n="booking.persons">Persons</span>
              <span class="ig-text-dim" id="maxPersonsHint" style="font-size:.75rem; font-weight:normal;">—</span>
            </label>
            <input type="number" id="bookingPersons" class="ig-input" value="1" min="1" required>
          </div>

          <!-- İletişim telefon -->
          <div class="ig-form-group">
            <label class="ig-label" for="bookingPhone">
              <span data-i18n="auth.phone">Phone</span>
            </label>
            <input type="tel" id="bookingPhone" class="ig-input" required placeholder="+90 555 555 5555">
          </div>

          <!-- Özel istek -->
          <div class="ig-form-group">
            <label class="ig-label" for="bookingNotes">
              <span data-i18n="booking.notes">Special requests</span>
              <span class="ig-text-dim" style="font-size:.75rem; font-weight:normal;">(optional)</span>
            </label>
            <textarea id="bookingNotes" class="ig-textarea" placeholder="Allergies, accessibility needs, language preference, etc."></textarea>
          </div>

          <!-- Hata mesajı -->
          <div id="bookingError" class="ig-error ig-hidden ig-mb-md"></div>

          <!-- Toplam fiyat (canlı güncellenir) -->
          <div class="ig-card ig-mb-lg" style="background:var(--ig-bg-soft);">
            <div class="ig-flex ig-justify-between ig-items-center">
              <span class="ig-overline">
                <span data-i18n="booking.total">Total</span>
              </span>
              <div class="ig-text-gold" style="font-family:var(--ig-font-display); font-size:1.75rem; font-weight:600;">
                <span id="totalPrice">—</span>
                <span id="totalCurrency" style="font-size:1rem;">—</span>
              </div>
            </div>
            <div class="ig-text-dim ig-mt-sm" style="font-size:.75rem;">
              <span id="priceBreakdown">—</span>
            </div>
          </div>

          <!-- Aksiyonlar -->
          <button type="submit" class="ig-btn ig-btn-primary ig-btn-block ig-btn-large">
            <span data-i18n="action.confirm">Confirm</span>
            <span style="margin-left:.5rem;">→</span>
          </button>

          <p class="ig-text-center ig-text-dim ig-mt-md" style="font-size:.75rem;">
            By confirming, you agree to our terms · Secure booking
          </p>

        </form>

      </div>

    </div>
  </main>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="ig-loading-overlay ig-hidden">
    <div class="ig-text-center">
      <div class="ig-loader ig-loader-large" style="margin:0 auto 1rem;"></div>
      <p class="ig-text-soft" id="loadingMessage" data-i18n="loading.booking">Creating booking...</p>
    </div>
  </div>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase.js"></script>

  <script>
    // ========================================================================
    // BOOKING.HTML — Rezervasyon Akışı
    // ========================================================================

    let currentService = null;
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', async () => {

      // Dil
      const currentLang = IG.getLang();
      document.querySelectorAll('.ig-lang-btn').forEach(btn => {
        if (btn.dataset.lang === currentLang) btn.classList.add('active');
        btn.addEventListener('click', () => IG.setLang(btn.dataset.lang));
      });

      // Auth
      try {
        currentUser = await IG.auth.getUser();
        if (!currentUser) {
          window.location.href = 'index.html';
          return;
        }
      } catch (err) {
        window.location.href = 'index.html';
        return;
      }

      // URL'den service ID
      const urlParams = new URLSearchParams(window.location.search);
      const serviceId = urlParams.get('service');

      if (!serviceId) {
        showError();
        return;
      }

      // Otel slug kontrolü (rezervasyon için zorunlu)
      const hotelSlug = localStorage.getItem('ig_hotel_slug');
      if (!hotelSlug) {
        document.getElementById('loadingState').innerHTML = `
          <p class="ig-text-soft">No hotel selected. Please scan QR again.</p>
          <a href="index.html" class="ig-btn ig-btn-primary ig-mt-lg">Back</a>
        `;
        return;
      }

      // Hizmeti yükle
      await loadService(serviceId);

      // Default tarih: bugün
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(today.getDate() + 1);
      document.getElementById('bookingDate').valueAsDate = tomorrow;
      document.getElementById('bookingDate').min = today.toISOString().split('T')[0];
      document.getElementById('bookingTime').value = '14:00';

      // Telefon: profilden çek
      try {
        const sb = await initSupabase();
        const { data: profile } = await sb
          .from('profiles')
          .select('phone')
          .eq('id', currentUser.id)
          .maybeSingle();
        if (profile?.phone) {
          document.getElementById('bookingPhone').value = profile.phone;
        }
      } catch (e) {
        // önemli değil, kullanıcı manuel girer
      }

      // Kişi sayısı değiştiğinde toplam güncelle
      document.getElementById('bookingPersons').addEventListener('input', updateTotal);

      // Form submit
      document.getElementById('bookingFormEl').addEventListener('submit', handleBooking);
    });

    // ========================================================================
    // HİZMETİ YÜKLE
    // ========================================================================
    async function loadService(serviceId) {
      const loadingEl = document.getElementById('loadingState');
      const formEl = document.getElementById('bookingForm');
      const currentLang = IG.getLang();

      try {
        const sb = await initSupabase();

        const { data: service, error } = await sb
          .from('services')
          .select(`
            id, name, base_price, currency, duration_minutes, max_capacity,
            providers ( id, name, slug, is_active )
          `)
          .eq('id', serviceId)
          .eq('is_active', true)
          .single();

        if (error || !service || !service.providers?.is_active) {
          showError();
          return;
        }

        currentService = service;

        // Çeviri
        const [svcTrans, provTrans] = await Promise.all([
          sb.from('service_translations')
            .select('name')
            .eq('service_id', serviceId)
            .eq('lang', currentLang)
            .maybeSingle(),
          sb.from('provider_translations')
            .select('name')
            .eq('provider_id', service.providers.id)
            .eq('lang', currentLang)
            .maybeSingle()
        ]);

        const serviceName = svcTrans.data?.name || service.name;
        const providerName = provTrans.data?.name || service.providers.name;

        // Render
        document.getElementById('summaryServiceName').textContent = serviceName;
        document.getElementById('summaryProviderName').textContent = providerName;
        document.getElementById('summaryUnitPrice').textContent =
          `${service.base_price} ${service.currency}`;
        document.getElementById('summaryDuration').textContent =
          service.duration_minutes ? `${service.duration_minutes} min` : '';

        document.getElementById('totalCurrency').textContent = service.currency;

        // Max persons
        document.getElementById('bookingPersons').max = service.max_capacity || 10;
        document.getElementById('maxPersonsHint').textContent =
          service.max_capacity > 1 ? `(max ${service.max_capacity})` : '';

        // Sayfa başlığı
        document.title = `${serviceName} · Booking`;

        updateTotal();

        loadingEl.classList.add('ig-hidden');
        formEl.classList.remove('ig-hidden');

      } catch (err) {
        console.error('Hizmet yüklenemedi:', err);
        showError();
      }
    }

    // ========================================================================
    // TOPLAMI GÜNCELLE (canlı)
    // Not: Gerçek hesap sunucuda yapılıyor, bu sadece preview
    // ========================================================================
    function updateTotal() {
      if (!currentService) return;

      const persons = parseInt(document.getElementById('bookingPersons').value) || 1;
      const total = currentService.base_price * persons;

      document.getElementById('totalPrice').textContent = total.toFixed(2);
      document.getElementById('priceBreakdown').textContent =
        persons > 1
          ? `${persons} × ${currentService.base_price} ${currentService.currency}`
          : '';
    }

    // ========================================================================
    // REZERVASYONU OLUŞTUR
    // ========================================================================
    async function handleBooking(e) {
      e.preventDefault();
      hideError();

      const date = document.getElementById('bookingDate').value;
      const time = document.getElementById('bookingTime').value;
      const persons = parseInt(document.getElementById('bookingPersons').value);
      const phone = document.getElementById('bookingPhone').value.trim();
      const notes = document.getElementById('bookingNotes').value.trim();

      // Validasyon
      if (!date || !time) {
        showBookingError('Please select date and time');
        return;
      }

      const scheduledAt = new Date(`${date}T${time}:00`);

      if (scheduledAt < new Date()) {
        showBookingError('Cannot book in the past');
        return;
      }

      if (persons < 1 || persons > (currentService.max_capacity || 10)) {
        showBookingError(`Persons must be between 1 and ${currentService.max_capacity || 10}`);
        return;
      }

      if (phone.length < 7) {
        showBookingError(IG.t('error.invalidPhone'));
        return;
      }

      // Yükleniyor göster
      document.getElementById('loadingOverlay').classList.remove('ig-hidden');

      try {
        // RPC ile rezervasyon oluştur
        // Fiyat ve komisyon SUNUCUDA hesaplanır
        const result = await IG.rpc('create_booking', {
          p_hotel_slug: localStorage.getItem('ig_hotel_slug'),
          p_service_id: currentService.id,
          p_scheduled_at: scheduledAt.toISOString(),
          p_num_persons: persons,
          p_special_requests: notes || null,
          p_contact_phone: phone,
          p_contact_email: currentUser.email,
          p_contact_lang: IG.getLang()
        });

        // Başarılı → ödeme sayfasına (henüz yok, şimdilik detay sayfasına)
        // Hafta 3'te PayTR ödemesine yönlendirilecek
        if (result && result.booking_id) {
          window.location.href = `booking-detail.html?id=${result.booking_id}&new=1`;
        } else {
          throw new Error('Booking creation failed');
        }

      } catch (err) {
        document.getElementById('loadingOverlay').classList.add('ig-hidden');
        console.error('Rezervasyon hatası:', err);

        // Anlamlı hata mesajları
        let msg = err.message || IG.t('error.generic');

        if (msg.includes('Rate limit')) {
          msg = 'Too many bookings. Please wait a moment.';
        } else if (msg.includes('Invalid hotel')) {
          msg = 'Hotel not found. Please scan QR again.';
        } else if (msg.includes('not active')) {
          msg = 'This service is currently unavailable.';
        } else if (msg.includes('past')) {
          msg = 'Cannot book in the past.';
        } else if (msg.includes('capacity')) {
          msg = 'Too many persons for this service.';
        }

        showBookingError(msg);
      }
    }

    // ========================================================================
    // YARDIMCI
    // ========================================================================
    function showError() {
      document.getElementById('loadingState').classList.add('ig-hidden');
      document.getElementById('errorState').classList.remove('ig-hidden');
    }

    function showBookingError(msg) {
      const el = document.getElementById('bookingError');
      el.textContent = msg;
      el.classList.remove('ig-hidden');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function hideError() {
      document.getElementById('bookingError').classList.add('ig-hidden');
    }
  </script>

</body>
</html>
