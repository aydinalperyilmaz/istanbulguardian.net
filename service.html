<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1428">
  <title>Istanbul Guardian — Service</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%E2%9A%93%3C/text%3E%3C/svg%3E">
</head>
<body>

  <nav class="ig-nav">
    <a href="javascript:history.back()" class="ig-nav-brand" style="text-decoration:none;">
      ← Istanbul <span>Guardian</span>
    </a>
    <div class="ig-lang-switcher">
      <button class="ig-lang-btn" data-lang="tr">TR</button>
      <button class="ig-lang-btn" data-lang="en">EN</button>
      <button class="ig-lang-btn" data-lang="ar">عر</button>
      <button class="ig-lang-btn" data-lang="ru">RU</button>
    </div>
  </nav>

  <main class="ig-page">
    <div class="ig-container ig-container-sm">

      <!-- Yükleniyor -->
      <div id="loadingState" class="ig-text-center" style="padding:4rem 0;">
        <div class="ig-loader ig-loader-large" style="margin:0 auto;"></div>
      </div>

      <!-- Hata durumu -->
      <div id="errorState" class="ig-card ig-text-center ig-hidden" style="padding:3rem 1.5rem;">
        <div style="font-size:3rem; margin-bottom:1rem;">⚠️</div>
        <h3 class="ig-mb-sm">Service not found</h3>
        <p class="ig-text-soft ig-mb-lg">
          This service may no longer be available.
        </p>
        <a href="app.html" class="ig-btn ig-btn-primary">
          <span data-i18n="action.back">Back</span>
        </a>
      </div>

      <!-- Detay -->
      <div id="serviceDetail" class="ig-hidden ig-fade-in">

        <!-- Hero görseli -->
        <div id="heroImage" class="ig-card-image ig-mb-lg" style="aspect-ratio: 16/10; max-height: 320px;">
          <!-- JS ile dolacak -->
        </div>

        <!-- Sağlayıcı meta -->
        <div class="ig-flex ig-items-center ig-gap-md ig-mb-md">
          <span id="categoryBadge" class="ig-badge">—</span>
          <span id="ratingDisplay" class="ig-text-gold ig-hidden" style="font-size:.9rem;">★ —</span>
        </div>

        <!-- Başlık -->
        <h1 class="ig-display ig-mb-sm" id="serviceName">—</h1>

        <!-- Sağlayıcı -->
        <p class="ig-text-soft ig-mb-xl" id="providerLine">—</p>

        <!-- Fiyat ve süre kutusu -->
        <div class="ig-card ig-mb-xl" style="background:linear-gradient(135deg, var(--ig-surface) 0%, var(--ig-surface-2) 100%);">
          <div class="ig-flex ig-justify-between ig-items-center">
            <div>
              <div class="ig-overline ig-mb-xs">PRICE</div>
              <div class="ig-text-gold" style="font-family:var(--ig-font-display); font-size:2rem; font-weight:600;">
                <span id="servicePrice">—</span>
                <span id="serviceCurrency" style="font-size:1rem;">—</span>
              </div>
              <div class="ig-text-dim" style="font-size:.8rem; margin-top:.25rem;" id="perPersonNote">
                per person
              </div>
            </div>
            <div id="durationBlock" class="ig-text-right ig-hidden" style="text-align:right;">
              <div class="ig-overline ig-mb-xs">DURATION</div>
              <div class="ig-text-soft" style="font-family:var(--ig-font-display); font-size:1.5rem;">
                <span id="serviceDuration">—</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Açıklama -->
        <div class="ig-mb-xl">
          <div class="ig-overline ig-mb-md">ABOUT</div>
          <p id="serviceDescription" style="line-height:1.8; white-space:pre-wrap;">—</p>
        </div>

        <!-- Sağlayıcı detayı -->
        <div class="ig-card ig-mb-xl">
          <div class="ig-overline ig-mb-md">PROVIDER</div>
          <h3 id="providerName" class="ig-mb-sm">—</h3>
          <p class="ig-text-soft ig-mb-md" id="providerDescription">—</p>
          <div class="ig-flex ig-gap-md ig-text-soft" style="font-size:.875rem;">
            <span id="providerDistrict">—</span>
            <span id="providerBookings" class="ig-hidden">—</span>
          </div>
        </div>

        <!-- İptal politikası -->
        <div id="cancellationBlock" class="ig-mb-xl ig-hidden">
          <div class="ig-overline ig-mb-md">CANCELLATION POLICY</div>
          <p class="ig-text-soft" id="cancellationPolicy" style="font-size:.9rem;">—</p>
        </div>

        <!-- Rezerve butonu -->
        <button id="bookBtn" class="ig-btn ig-btn-primary ig-btn-block ig-btn-large">
          <span data-i18n="action.book">Book now</span>
        </button>

        <p class="ig-text-center ig-text-dim ig-mt-md" style="font-size:.75rem;">
          Secure payment · Free cancellation policy applies
        </p>

      </div>

      <p class="ig-text-center ig-text-dim ig-mt-2xl" style="font-size:.75rem;">
        © 2026 Bosphorus Global
      </p>

    </div>
  </main>

  <script src="assets/i18n.js"></script>
  <script src="assets/supabase.js"></script>

  <script>
    // ========================================================================
    // SERVICE.HTML — Hizmet detay sayfası
    // ========================================================================

    const CATEGORY_LABELS = {
      hammam: 'cat.hammam', tour: 'cat.tour', transfer: 'cat.transfer',
      restaurant: 'cat.restaurant', health: 'cat.health', nightlife: 'cat.nightlife'
    };

    let currentService = null;

    document.addEventListener('DOMContentLoaded', async () => {

      // Dil
      const currentLang = IG.getLang();
      document.querySelectorAll('.ig-lang-btn').forEach(btn => {
        if (btn.dataset.lang === currentLang) btn.classList.add('active');
        btn.addEventListener('click', () => IG.setLang(btn.dataset.lang));
      });

      // Auth
      try {
        const user = await IG.auth.getUser();
        if (!user) {
          window.location.href = 'index.html';
          return;
        }
      } catch (err) {
        window.location.href = 'index.html';
        return;
      }

      // URL'den service ID
      const urlParams = new URLSearchParams(window.location.search);
      const serviceId = urlParams.get('id');

      if (!serviceId) {
        showError();
        return;
      }

      await loadService(serviceId);

      // Rezerve butonu
      document.getElementById('bookBtn').addEventListener('click', () => {
        if (!currentService) return;
        window.location.href = `booking.html?service=${serviceId}`;
      });
    });

    // ========================================================================
    // HIZMETI YÜKLE
    // ========================================================================
    async function loadService(serviceId) {
      const loadingEl = document.getElementById('loadingState');
      const detailEl = document.getElementById('serviceDetail');
      const currentLang = IG.getLang();

      try {
        const sb = await initSupabase();

        // Hizmet + sağlayıcı (joined)
        const { data: service, error } = await sb
          .from('services')
          .select(`
            id, name, description, base_price, currency, duration_minutes,
            max_capacity, cover_image_url, gallery_urls, provider_id,
            providers (
              id, name, slug, description, district, rating, total_bookings,
              category, cover_image_url, cancellation_policy
            )
          `)
          .eq('id', serviceId)
          .eq('is_active', true)
          .single();

        if (error || !service) {
          showError();
          return;
        }

        // Sağlayıcı aktif mi kontrol
        if (!service.providers) {
          showError();
          return;
        }

        currentService = service;

        // Çevirileri al
        const [svcTrans, provTrans] = await Promise.all([
          sb.from('service_translations')
            .select('name, description')
            .eq('service_id', serviceId)
            .eq('lang', currentLang)
            .maybeSingle(),
          sb.from('provider_translations')
            .select('name, description')
            .eq('provider_id', service.providers.id)
            .eq('lang', currentLang)
            .maybeSingle()
        ]);

        // Render
        renderService(service, svcTrans.data, provTrans.data);

        loadingEl.classList.add('ig-hidden');
        detailEl.classList.remove('ig-hidden');

      } catch (err) {
        console.error('Hizmet yüklenemedi:', err);
        showError();
      }
    }

    // ========================================================================
    // RENDER
    // ========================================================================
    function renderService(svc, svcTrans, provTrans) {
      const provider = svc.providers;

      // Çevrilebilir alanlar
      const serviceName = svcTrans?.name || svc.name;
      const serviceDesc = svcTrans?.description || svc.description || '';
      const providerName = provTrans?.name || provider.name;
      const providerDesc = provTrans?.description || provider.description || '';

      // Hero görseli
      const heroImg = document.getElementById('heroImage');
      const imgUrl = svc.cover_image_url || provider.cover_image_url;
      if (imgUrl) {
        heroImg.innerHTML = `<img src="${imgUrl}" alt="${escapeHtml(serviceName)}" loading="eager">`;
      } else {
        heroImg.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; height:100%; font-size:4rem;">
          ${getCategoryIcon(provider.category)}
        </div>`;
      }

      // Kategori badge
      document.getElementById('categoryBadge').textContent = IG.t(CATEGORY_LABELS[provider.category] || '');

      // Rating
      if (provider.rating > 0) {
        const ratingEl = document.getElementById('ratingDisplay');
        ratingEl.textContent = `★ ${provider.rating.toFixed(1)}`;
        ratingEl.classList.remove('ig-hidden');
      }

      // Başlık + sağlayıcı
      document.getElementById('serviceName').textContent = serviceName;
      document.getElementById('providerLine').textContent =
        `${providerName} · ${provider.district || ''}`;

      // Fiyat
      document.getElementById('servicePrice').textContent = svc.base_price;
      document.getElementById('serviceCurrency').textContent = svc.currency;

      // Süre
      if (svc.duration_minutes) {
        document.getElementById('serviceDuration').textContent = `${svc.duration_minutes} min`;
        document.getElementById('durationBlock').classList.remove('ig-hidden');
      }

      // Açıklama
      document.getElementById('serviceDescription').textContent =
        serviceDesc || 'A premium service curated for our guests.';

      // Sağlayıcı detay
      document.getElementById('providerName').textContent = providerName;
      document.getElementById('providerDescription').textContent =
        providerDesc || `Trusted partner in ${provider.district || 'Istanbul'}.`;
      document.getElementById('providerDistrict').textContent = `📍 ${provider.district || ''}`;

      if (provider.total_bookings > 0) {
        const el = document.getElementById('providerBookings');
        el.textContent = `· ${provider.total_bookings}+ bookings`;
        el.classList.remove('ig-hidden');
      }

      // İptal politikası
      if (provider.cancellation_policy) {
        document.getElementById('cancellationPolicy').textContent = provider.cancellation_policy;
        document.getElementById('cancellationBlock').classList.remove('ig-hidden');
      }

      // Sayfa başlığı
      document.title = `${serviceName} · Istanbul Guardian`;
    }

    // ========================================================================
    // YARDIMCI
    // ========================================================================
    function showError() {
      document.getElementById('loadingState').classList.add('ig-hidden');
      document.getElementById('errorState').classList.remove('ig-hidden');
    }

    function getCategoryIcon(cat) {
      const icons = {
        hammam: '🛁', tour: '⛵', transfer: '🚐',
        restaurant: '🍽', health: '🏥', nightlife: '🌃'
      };
      return icons[cat] || '⚓';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, c => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
      }[c]));
    }
  </script>

</body>
</html>
